steps:
  - name: Export GitHub repository context for Copilot agent
    if: ${{ env.GITHUB_ACTIONS == 'true' && env.GITHUB_SERVER_URL != '' }}
    run: |
      echo "GITHUB_SERVER_URL=${GITHUB_SERVER_URL}" >> "$GITHUB_ENV"
      echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}" >> "$GITHUB_ENV"
      echo "GITHUB_REPOSITORY_OWNER=${GITHUB_REPOSITORY_OWNER}" >> "$GITHUB_ENV"
